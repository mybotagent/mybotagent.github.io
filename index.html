<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://mybotagent.github.io/hermes-architecture-deck/">
<link rel="canonical" href="https://mybotagent.github.io/hermes-architecture-deck/">
<title>YuRi — Portfolio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #ffffff;
    color: #1d1d1f;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .glyph {
    font-size: 4rem;
    color: #0066cc;
    margin-bottom: 0.5em;
    line-height: 1;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 600;
    line-height: 1.07;
    letter-spacing: -0.035em;
    color: #1d1d1f;
    margin-bottom: 0.4em;
  }
  h1 em {
    font-style: italic;
    font-weight: 500;
    color: #0066cc;
  }
  .sub {
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 300;
    color: #6e6e73;
    margin-bottom: 2em;
    max-width: 30ch;
  }
  .cta {
    display: inline-block;
    padding: 0.95em 2.2em;
    background: #0066cc;
    color: #ffffff;
    text-decoration: none;
    border-radius: 980px;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .cta:hover { background: #0071e3; transform: scale(1.02); }
  .meta {
    margin-top: 2.5em;
    font-size: 0.8rem;
    color: #86868b;
  }
  .meta a { color: #0066cc; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="glyph">⚡</div>
  <h1>YuRi's <em>Portfolio</em></h1>
  <p class="sub">A growing collection of system architecture decks and engineering write-ups.</p>
  <a class="cta" href="https://mybotagent.github.io/hermes-architecture-deck/">Enter Portfolio</a>
  <p class="meta">
    Source on <a href="https://github.com/mybotagent/hermes-architecture-deck">GitHub</a>
  </p>
</body>
</html>
