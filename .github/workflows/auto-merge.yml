name: auto-merge

# Auto-merge PRs whose review verdict is "Approve" (i.e. no 🔴 critical or
# 🟠 major findings). For any other verdict, leave a comment and let the
# human decide.
#
# v2 (2026-07-07): race-condition fix:
#   - concurrency group per PR (cancel previous trigger's in-progress run)
#   - read verdict from newest comment WITH A REVIEW-BOT RUN, not worst-of
#     across all historic comments (fix re-verdict was being masked by old
#     Changes Requested/Blocked).
#   - poll on GitHub Actions run conclusion (verdict comment arrives after
#     run.success), tighter loop, lower timeout.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to gate"
        required: false
        type: string

# Cancel any older auto-merge run for the same PR before starting a new one.
concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  smoke:
    name: ci / smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Python import smoke
        run: |
          python3 -c "import json,pathlib; print('python OK', pathlib.Path('.').resolve().name)"
      - name: Files present
        run: |
          test -d .github/workflows
          echo "structure OK"

  auto-merge:
    name: auto-merge gate
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            N="${{ github.event.inputs.pr_number }}"
          else
            N="${{ github.event.pull_request.number }}"
          fi
          echo "number=${N}" >> "$GITHUB_OUTPUT"
          echo "number=${N}" >> "$GITHUB_ENV"
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"

      - name: Wait for review-bot verdict (NEWEST comment matching HEAD sha)
        id: wait
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          # Poll PR comments; prefer verdict comment whose body contains
          # a sha marker for HEAD_SHA. Fallback: latest verdict comment by bot.
          for i in $(seq 1 30); do
            http_code=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --include -o /tmp/_comments.json -w "%{http_code}" 2>/dev/null || echo "0")
            if [ "$http_code" = "403" ] || [ "$http_code" = "429" ]; then
              echo "[poll $i/30] rate-limited (HTTP $http_code), backing off 30s"
              sleep 30
              continue
            fi
            # Strategy 1: comment with sha marker for HEAD_SHA
            matched=$(jq -r --arg sha "$HEAD_SHA" \
              '.[] | select(.body | contains("<!-- sha: " + $sha + " -->")) | .body' \
              /tmp/_comments.json 2>/dev/null \
              | grep -oE '\*\*Verdict:\*\*\s*(Approve|Changes Requested|Blocked)' \
              | tail -1 | awk '{print $NF}' || echo "")
            if [ -z "$matched" ]; then
              # Strategy 2: latest verdict line from any github-actions[bot] comment
              matched=$(jq -r '.[] | select(.user.login == "github-actions[bot]") | .body' \
                /tmp/_comments.json 2>/dev/null \
                | grep -oE '\*\*Verdict:\*\*\s*(Approve|Changes Requested|Blocked)' \
                | tail -1 | awk '{print $NF}' || echo "")
            fi
            if [ -n "$matched" ]; then
              echo "matched verdict: $matched (head=$HEAD_SHA, poll=$i)"
              echo "VERDICT=$matched" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "[poll $i/30] no verdict for head=$HEAD_SHA yet"
            sleep 10
          done
          echo "VERDICT=<timeout>" >> "$GITHUB_OUTPUT"

      - name: Verdict + mergeable check
        env:
          VERDICT: ${{ steps.wait.outputs.VERDICT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          echo "Final verdict: $VERDICT"
          if [ "$VERDICT" != "Approve" ]; then
            msg="🤖 auto-merge: review verdict is \`$VERDICT\` (not Approve). Skipping auto-merge. Human review required."
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="$msg" >/dev/null
            exit 1
          fi
          resp=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.mergeable_state')
          echo "mergeable_state=$resp"
          case "$resp" in
            clean|unstable|behind) echo "OK" ;;
            *) echo "::error::mergeable_state blocked/dirty: $resp"; exit 1 ;;
          esac

      - name: Squash-merge
        env:
          VERDICT: ${{ steps.wait.outputs.VERDICT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        if: env.VERDICT == 'Approve'
        run: |
          echo "auto-merging PR #$PR_NUMBER (squash)"
          gh api -X PUT "repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -F commit_title="merge: auto squash #$PR_NUMBER via auto-merge v2" \
            -F commit_message="auto-merge: review verdict=Approve + mergeable clean (race-condition hardened)" \
            -F squash=true
