name: review-bot
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  review:
    uses: mybotagent/hermes-pr-gate/.github/workflows/review-bot-reusable.yml@main
    secrets:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
